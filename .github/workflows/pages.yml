name: Deploy NuCare to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: RLT clinical regression gates
        run: |
          npm run test:rlt
          npm run test:assessment-rlt-mapping
          npm run validate:rlt-regression
          npm run validate:assessment-rlt-mappings
          npm run test:assessment-care-guidance
          npm run test:rlt-dependency
          npm run validate:assessment-care-guidance
          npm run validate:rlt-dependency

      - name: Build static site
        run: npm run build:pages

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Debug Pages artifact
        run: |
          ls -la dist
          find dist -maxdepth 2 -type f
          grep -o 'src="[^"]*"' dist/index.html || true
          grep -o 'href="[^"]*"' dist/index.html || true
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/.nojekyll
          test -d dist/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
